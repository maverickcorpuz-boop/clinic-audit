<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinic Audit Pro</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- UI & THEMING --- */
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; padding: 15px; -webkit-font-smoothing: antialiased; }
        .container { max-width: 500px; margin: auto; padding-bottom: 40px; }
        
        .app-header { text-align: center; margin-bottom: 20px; padding-top: 10px; }
        .app-header h2 { margin: 0; color: #0f172a; font-weight: 700; font-size: 26px; }
        .app-header p { margin: 5px 0 0 0; color: #64748b; font-size: 14px; }

        .card { background: #ffffff; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: relative;}
        .card-title { font-size: 13px; font-weight: 700; margin-bottom: 15px; color: #475569; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.8px; }

        .form-group { margin-bottom: 16px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px 14px; font-size: 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; background-color: #f8fafc; box-sizing: border-box; transition: all 0.2s ease; }
        input:focus { outline: none; border-color: #3b82f6; background-color: #ffffff; }

        /* Session Info Bar */
        .session-info-bar { background: #0f172a; color: #e2e8f0; padding: 10px 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 11px; font-weight: 500; }
        .session-info-bar strong { color: #3b82f6; }

        /* Collapsible Scanner */
        .camera-toggle-header { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .camera-toggle-header.active { border-color: #f59e0b; background: #fffbeb; color: #b45309; }
        #camera-container { display: none; overflow: hidden; }

        /* Search Results Overlay */
        #search-results { position: absolute; width: calc(100% - 40px); z-index: 100; background: white; border: 1px solid #e2e8f0; border-radius: 0 0 10px 10px; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .search-item:hover { background: #eff6ff; color: #3b82f6; }

        /* Buttons */
        .btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; transition: 0.2s; }
        .btn-primary { background-color: #3b82f6; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
        .btn-success { background-color: #10b981; }
        .btn-outline { background-color: transparent; border: 1.5px solid #e2e8f0; color: #64748b; font-size: 13px; margin-top: 10px; }

        /* Dashboard */
        .dash-stats { display: flex; justify-content: space-between; margin-bottom: 15px; text-align: center; }
        .stat-num { font-size: 20px; font-weight: 800; color: #0f172a; }
        .stat-label { font-size: 10px; color: #64748b; font-weight: 700; text-transform: uppercase; }
        .progress-wrapper { background: #e2e8f0; border-radius: 10px; height: 8px; overflow: hidden; }
        #dash-progress-bar { background: #3b82f6; height: 100%; width: 0%; transition: width 0.6s ease; }

        #reader { width: 100%; background: #0f172a; border-radius: 12px; min-height: 250px; display: flex; align-items: center; justify-content: center; color: #94a3b8; margin-bottom: 15px; }
        .detail-box { padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-bottom: 15px; border-left: 4px solid #3b82f6; background: #eff6ff; }
        .variance-neg { color: #e11d48; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h2>Clinic Audit Pro</h2>
        <p id="app-subtitle">Session Configuration</p>
    </div>
    
    <div id="setup-module">
        <div class="card">
            <div class="card-title">⚙️ Session Setup</div>
            <div class="grid-2 form-group">
                <div><label>Clinic Branch</label><input type="text" id="branch-name" placeholder="Branch Name"></div>
                <div><label>Auditor Name</label><input type="text" id="auditor-name" placeholder="Your Name"></div>
            </div>
            <div class="form-group">
                <label>Master List (.CSV)</label>
                <input type="file" id="csv-upload" accept=".csv" onchange="loadMasterList(event)">
                <div id="upload-status" style="font-size: 12px; color: #64748b; margin-top: 8px;">Upload master list to unlock.</div>
            </div>
            <button id="begin-audit-btn" class="btn btn-primary" onclick="enterAuditMode()" style="opacity: 0.5; cursor: not-allowed;" disabled>🚀 Begin Audit Session</button>
        </div>
    </div>

    <div id="audit-module" style="display: none;">
        <div class="session-info-bar">
            <span>Branch: <strong id="info-branch">-</strong></span>
            <span>Auditor: <strong id="info-auditor">-</strong></span>
            <span onclick="exitAuditMode()" style="color:#ef4444; cursor:pointer; font-weight:700;">EXIT</span>
        </div>

        <div class="card">
            <div class="card-title">📈 Live Progress</div>
            <div class="dash-stats">
                <div class="stat-box"><div class="stat-num" id="dash-total">0</div><div class="stat-label">Total</div></div>
                <div class="stat-box"><div class="stat-num" style="color: #3b82f6;" id="dash-done">0</div><div class="stat-label">Counted</div></div>
                <div class="stat-box"><div class="stat-num" style="color: #f43f5e;" id="dash-remaining">0</div><div class="stat-label">Missing</div></div>
                <div class="stat-box"><div class="stat-num" style="color: #10b981;" id="dash-percent">0%</div><div class="stat-label">Done</div></div>
            </div>
            <div class="progress-wrapper"><div id="dash-progress-bar"></div></div>
        </div>

        <div class="card">
            <div class="card-title">🔍 Scan & Entry</div>
            
            <div style="position: relative;">
                <input type="text" id="manual-search" placeholder="🔍 Search item name..." onkeyup="searchItems()" autocomplete="off">
                <div id="search-results"></div>
            </div>
            
            <div id="camera-toggle" class="camera-toggle-header" onclick="toggleCamera()" style="margin-top: 12px;">
                <span id="camera-status-text" style="font-weight: 600; font-size: 14px;">📷 Open Scanner</span>
                <span id="camera-icon" style="font-size: 12px;">▼</span>
            </div>
            <div id="camera-container"><div id="reader">Initialising...</div></div>
            <div id="item-details"></div>

            <div class="form-group">
                <label>Storage Zone</label>
                <input type="text" id="scan-zone" list="zone-list" placeholder="Current location...">
                <datalist id="zone-list">
                    <option value="Main Pharmacy"><option value="Fridge"><option value="Warehouse">
                </datalist>
            </div>

            <div class="grid-2 form-group">
                <div><label>Barcode</label><input type="text" id="barcode-result" readonly></div>
                <div><label>Count Found</label><input type="number" id="physical-qty"></div>
            </div>

            <div class="grid-2 form-group">
                <div>
                    <label>Condition</label>
                    <select id="item-condition"><option value="Good">✅ Good</option><option value="Damaged">❌ Damaged</option></select>
                </div>
                <div><label>Expiry Date</label><input type="date" id="expiry-date"></div>
            </div>

            <button class="btn btn-primary" onclick="saveAuditEntry()">💾 Save Audit Entry</button>
            <div id="status"></div>
        </div>

        <div class="card">
            <div class="card-title">📊 Session Trail</div>
            <div style="overflow-x: auto;">
                <table id="history-table">
                    <thead><tr><th>Item</th><th>Sys</th><th>Phy</th><th>Var</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
            <button class="btn btn-success" onclick="downloadCSV()" style="margin-top:20px;">⬇ Export Full CSV Report</button>
            <button class="btn btn-outline btn-danger" onclick="clearData()">⚠ Wipe Session Data</button>
        </div>
    </div>
</div>

<script>
    let masterInventory = {}; 
    let auditTrail = JSON.parse(localStorage.getItem('clinic_audit_data')) || [];
    let html5QrCode;
    let cameraRunning = false;

    /* --- SETUP LOGIC --- */
    function loadMasterList(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let tempInv = {};
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length >= 3) {
                    const bc = cols[0].trim();
                    const qty = parseInt(cols[2]) || 0;
                    if (tempInv[bc]) tempInv[bc].systemQty += qty;
                    else tempInv[bc] = { name: cols[1].trim(), systemQty: qty };
                }
            }
            masterInventory = tempInv;
            const count = Object.keys(masterInventory).length;
            document.getElementById('upload-status').innerHTML = `<span style="color:#10b981; font-weight:700;">✔ Loaded ${count} SKUs.</span>`;
            document.getElementById('begin-audit-btn').style.opacity = "1";
            document.getElementById('begin-audit-btn').disabled = false;
        };
        reader.readAsText(file);
    }

    function enterAuditMode() {
        const b = document.getElementById('branch-name').value;
        const a = document.getElementById('auditor-name').value;
        if (!b || !a) return alert("Fill in Branch and Auditor!");
        localStorage.setItem('clinic_branch_name', b);
        localStorage.setItem('clinic_auditor_name', a);
        document.getElementById('info-branch').innerText = b;
        document.getElementById('info-auditor').innerText = a;
        document.getElementById('setup-module').style.display = "none";
        document.getElementById('audit-module').style.display = "block";
        document.getElementById('app-subtitle').innerText = "Audit Workspace";
        updateDashboard(); updateHistoryTable();
    }

    function exitAuditMode() {
        if(confirm("Exit workspace? Your scans are safe.")) {
            if(cameraRunning) toggleCamera();
            document.getElementById('setup-module').style.display = "block";
            document.getElementById('audit-module').style.display = "none";
        }
    }

    /* --- CAMERA CONTROL (IMPROVED) --- */
    function toggleCamera() {
        const container = document.getElementById('camera-container');
        const header = document.getElementById('camera-toggle');
        const statusText = document.getElementById('camera-status-text');

        if (!cameraRunning) {
            cameraRunning = true;
            container.style.display = "block";
            header.classList.add('active');
            statusText.innerText = "⌛ Accessing Camera...";
            
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 }, 
                onScanSuccess
            ).then(() => {
                statusText.innerText = "🛑 Close Scanner";
                document.getElementById('camera-icon').innerText = "▲";
                document.getElementById('reader').innerText = "";
            }).catch(err => {
                alert("Camera failed: " + err);
                cameraRunning = false;
                container.style.display = "none";
                header.classList.remove('active');
                statusText.innerText = "📷 Open Scanner";
            });
        } else {
            cameraRunning = false;
            container.style.display = "none";
            header.classList.remove('active');
            statusText.innerText = "📷 Open Scanner";
            document.getElementById('camera-icon').innerText = "▼";
            if (html5QrCode) html5QrCode.stop().catch(err => console.log(err));
        }
    }

    function onScanSuccess(bc) {
        // CLEANUP SEARCH UI ON SELECT
        document.getElementById('search-results').innerHTML = "";
        document.getElementById('manual-search').value = "";

        document.getElementById('barcode-result').value = bc;
        const item = masterInventory[bc];
        const det = document.getElementById('item-details');
        det.innerHTML = item ? `<div class="detail-box"><strong>${item.name}</strong><br>System: ${item.systemQty} units</div>` : `<div class="detail-box" style="background:#fff1f2; color:#991b1b;">Item not in list</div>`;
        
        if (navigator.vibrate) navigator.vibrate(100);
        html5QrCode.pause(true);
        setTimeout(() => { if(cameraRunning) html5QrCode.resume(); }, 2000);
    }

    /* --- SEARCH (CLEAN LOGIC) --- */
    function searchItems() {
        const q = document.getElementById('manual-search').value.toLowerCase();
        const res = document.getElementById('search-results');
        res.innerHTML = ""; 
        if(q.length < 2) return;
        for(let bc in masterInventory) if(masterInventory[bc].name.toLowerCase().includes(q)) {
            const d = document.createElement('div'); d.innerText = masterInventory[bc].name; d.className = "search-item";
            d.onclick = () => onScanSuccess(bc); 
            res.appendChild(d);
        }
    }

    document.addEventListener('click', (e) => {
        if (!document.getElementById('manual-search').contains(e.target)) {
            document.getElementById('search-results').innerHTML = "";
        }
    });

    /* --- DATA MANAGEMENT --- */
    function saveAuditEntry() {
        const bc = document.getElementById('barcode-result').value;
        const qty = parseInt(document.getElementById('physical-qty').value);
        if (!bc || isNaN(qty)) return alert("Missing data!");

        let cond = document.getElementById('item-condition').value;
        const exp = document.getElementById('expiry-date').value;
        const zone = document.getElementById('scan-zone').value || "General";
        if (exp && new Date(exp) < new Date().setHours(0,0,0,0)) cond = "Expired";

        const item = masterInventory[bc];
        const idx = auditTrail.findIndex(e => e.barcode === bc);

        if (idx !== -1) {
            let e = auditTrail[idx];
            e.physical += qty;
            e.variance = e.physical - e.system;
            if (cond === "Expired") e.expiredQty = (e.expiredQty || 0) + qty;
            else if (cond === "Damaged") e.damagedQty = (e.damagedQty || 0) + qty;
            else e.goodQty = (e.goodQty || 0) + qty;
            if (exp && !e.expiry.includes(exp)) e.expiry += " & " + exp;
            if (!e.locations.includes(zone)) e.locations += " + " + zone;
        } else {
            auditTrail.unshift({
                barcode: bc, name: item ? item.name : "Unknown",
                system: item ? item.systemQty : 0, physical: qty,
                goodQty: cond === "Good" ? qty : 0, damagedQty: cond === "Damaged" ? qty : 0, expiredQty: cond === "Expired" ? qty : 0,
                variance: qty - (item ? item.systemQty : 0), date: new Date().toLocaleDateString(), 
                branch: localStorage.getItem('clinic_branch_name'), auditor: localStorage.getItem('clinic_auditor_name'),
                expiry: exp || "N/A", locations: zone
            });
        }
        localStorage.setItem('clinic_audit_data', JSON.stringify(auditTrail));
        updateDashboard(); updateHistoryTable();
        document.getElementById('barcode-result').value = "";
        document.getElementById('physical-qty').value = "";
        document.getElementById('item-details').innerHTML = "";
    }

    function updateDashboard() {
        const total = Object.keys(masterInventory).length;
        const done = new Set(auditTrail.map(e => e.barcode)).size;
        const pct = total === 0 ? 0 : Math.round((done/total)*100);
        document.getElementById('dash-total').innerText = total;
        document.getElementById('dash-done').innerText = done;
        document.getElementById('dash-remaining').innerText = total - done;
        document.getElementById('dash-percent').innerText = pct + "%";
        document.getElementById('dash-progress-bar').style.width = pct + "%";
    }

    function updateHistoryTable() {
        document.getElementById('history-body').innerHTML = auditTrail.slice(0,5).map(r => `<tr><td>${r.name}</td><td>${r.system}</td><td>${r.physical}</td><td class="${r.variance < 0 ? 'variance-neg' : ''}">${r.variance}</td></tr>`).join('');
    }

    function downloadCSV() {
        if(auditTrail.length === 0) return alert("Nothing to export!");
        let b = localStorage.getItem('clinic_branch_name'), a = localStorage.getItem('clinic_auditor_name'), d = new Date().toLocaleDateString();
        let csv = "Item Name,Barcode,System Qty,Good Qty,Damaged Qty,Expired Qty,Total Physical,Variance,Locations,Expiry Dates,Auditor,Branch,Date\n";
        let scannedBCs = new Set();
        auditTrail.forEach(r => {
            scannedBCs.add(r.barcode.toString());
            csv += `"${r.name}",${r.barcode},${r.system},${r.goodQty || 0},${r.damagedQty || 0},${r.expiredQty || 0},${r.physical},${r.variance},"${r.locations}","${r.expiry}","${a}","${b}","${r.date}"\n`;
        });
        for (let bc in masterInventory) if (!scannedBCs.has(bc.toString())) {
            let itm = masterInventory[bc];
            csv += `"${itm.name}",${bc},${itm.systemQty},0,0,0,0,${0 - itm.systemQty},"MISSING","N/A","${a}","${b}","${d}"\n`;
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Audit_Report_${b}.csv`;
        link.click();
    }

    function clearData() {
        if(confirm("Permanently wipe session data?")) {
            auditTrail = []; localStorage.removeItem('clinic_audit_data');
            updateDashboard(); updateHistoryTable();
        }
    }
</script>
</body>
</html>
